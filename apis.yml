apis:
- aid: bloomberg-proprietary-technologies:blpapi
  name: Bloomberg Open API (BLPAPI)
  description: Bloomberg's proprietary socket-based API protocol for accessing Bloomberg
    data, providing a high-performance connectivity layer between client applications
    and Bloomberg's data infrastructure.
  humanURL: https://bloomberg.github.io/blpapi-docs/
  baseURL: blpapi://localhost:8194
  tags:
  - BLPAPI
  - Protocol
  - Proprietary API
  properties:
  - type: Documentation
    url: https://bloomberg.github.io/blpapi-docs/
- aid: bloomberg-proprietary-technologies:figi-api
  name: Bloomberg FIGI API
  description: The Financial Instrument Global Identifier (FIGI) is Bloomberg's open
    standard for identifying financial instruments. The OpenFIGI API allows free
    mapping of tickers, ISINs, CUSIPs, and other identifiers to FIGI codes.
  humanURL: https://www.openfigi.com/api
  baseURL: https://api.openfigi.com
  tags:
  - FIGI
  - Financial Identifiers
  - OpenFIGI
  - Mapping
  properties:
  - type: Documentation
    url: https://www.openfigi.com/api
  - type: OpenAPI
    url: https://api.openfigi.com/schema/openapi.json
- aid: bloomberg-proprietary-technologies:bql
  name: Bloomberg Query Language (BQL)
  description: Bloomberg's proprietary query language enabling flexible data requests
    with filtering, aggregation, and calculated field capabilities across Bloomberg's
    data universe.
  humanURL: https://www.bloomberg.com/professional/support/api-library/
  baseURL: bql://bloomberg.com
  tags:
  - BQL
  - Query Language
  - Proprietary
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/support/api-library/
