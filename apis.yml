aid: bloomberg-proprietary-technologies
name: Bloomberg Proprietary Technologies
description: Bloomberg Proprietary Technologies encompasses the internally developed
  technology innovations that power Bloomberg's products and services. This includes
  Bloomberg's proprietary data network, the BLPAPI connectivity protocol, BQL query
  language, B-PIPE data distribution technology, FIGI (Financial Instrument Global
  Identifier) system, and the Bloomberg Generative AI capabilities integrated into
  its financial data platform.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/bloomberg-proprietary-technologies/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-04-21'
